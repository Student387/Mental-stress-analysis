{% extends "base.html" %}
{% block title %}Error - Student Mental Stress Analysis{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Error</h5>
            </div>
            <div class="card-body">
                <p class="mb-4">{{ message }}</p>
                <a href="{{ url_for('questionnaire') }}" class="btn btn-primary">Back to Questionnaire</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
