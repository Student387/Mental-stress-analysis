{% extends "base.html" %}
{% block title %}Login - Student Mental Stress Analysis{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-theme-primary text-white py-3">
                <h5 class="mb-0"><i class="bi bi-box-arrow-in-right me-2"></i>Login</h5>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label">Username or Email</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    <a href="{{ url_for('register') }}">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
